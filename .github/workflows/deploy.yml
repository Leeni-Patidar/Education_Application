name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t leeni004/education-app-frontend .

    - name: Login DockerHub
      run: echo "${{ secrets.lEENIP#004 }}" | docker login -u "${{ secrets.leeni004 }}" --password-stdin

    - name: Push Image
      run: docker push leeni004/education-app-frontend

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml